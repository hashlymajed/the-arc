<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In · The Arc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #1B2632;
      --surface: rgba(238,233,223,0.05);
      --border:  rgba(238,233,223,0.10);
      --border2: rgba(238,233,223,0.22);
      --text:    #EEE9DF;
      --muted:   #697585;
      --gold:    #FFB162;
      --red:     #e05a5a;
    }

    html, body { height: 100%; font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 80% 95%, rgba(255,177,98,0.16) 0%, transparent 45%),
        radial-gradient(ellipse at 10% 5%,  rgba(44,59,77,0.60) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(163,81,57,0.07) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    .login-wrap {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%; max-width: 400px;
      background: rgba(238,233,223,0.04);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(12px);
    }

    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-brand .arc-word {
      font-family: 'Instrument Serif', serif;
      font-size: 11px;
      font-style: italic;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .login-brand h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .login-brand p {
      font-size: 12px;
      color: var(--muted);
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: rgba(238,233,223,0.06);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus {
      border-color: var(--gold);
    }

    .field input::placeholder { color: var(--muted); }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--gold);
      color: #1B2632;
      border: none;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      display: none;
      background: rgba(224,90,90,0.12);
      border: 1px solid rgba(224,90,90,0.35);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 16px;
      text-align: center;
    }

    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="arc-word">The Arc</div>
        <h1>Aldar</h1>
        <p>AI Strategic Communications Platform</p>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm">
        <div class="field">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username" autofocus>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          Sign In
        </button>
      </form>

      <div class="login-footer">Aldar Properties &copy; 2026</div>
    </div>
  </div>

  <script>
    const form     = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in…';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/';
        } else {
          errorMsg.textContent = data.error || 'Sign in failed';
          errorMsg.style.display = 'block';
        }
      } catch {
        errorMsg.textContent = 'Connection error — please try again';
        errorMsg.style.display = 'block';
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
